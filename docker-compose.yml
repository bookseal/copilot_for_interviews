version: "3.9"

services:
  signal-copilot:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./frontend:/app/frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
