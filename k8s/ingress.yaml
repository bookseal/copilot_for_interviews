apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signal-copilot
  namespace: signal-copilot
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/websocket: "true"
spec:
  rules:
    - host: signal-copilot.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: signal-copilot
                port:
                  number: 80
